<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#6366f1"/>
  <!-- antennae -->
  <line x1="13" y1="8.5" x2="10" y2="4.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="19" y1="8.5" x2="22" y2="4.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="10" cy="4.5" r="1.2" fill="white"/>
  <circle cx="22" cy="4.5" r="1.2" fill="white"/>
  <!-- head -->
  <circle cx="16" cy="11" r="3.2" fill="white"/>
  <!-- thorax -->
  <ellipse cx="16" cy="16" rx="2.2" ry="2.5" fill="white"/>
  <!-- abdomen -->
  <ellipse cx="16" cy="22.5" rx="3.6" ry="4.2" fill="white"/>
  <!-- left legs -->
  <line x1="13.8" y1="14.2" x2="8" y2="12.5" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="13.8" y1="16" x2="7.5" y2="16" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="13.8" y1="17.8" x2="8" y2="20" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
  <!-- right legs -->
  <line x1="18.2" y1="14.2" x2="24" y2="12.5" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="18.2" y1="16" x2="24.5" y2="16" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="18.2" y1="17.8" x2="24" y2="20" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
</svg>
