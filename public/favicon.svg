<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="5" fill="#0a0a0a"/>
  <!-- subtle grid lines -->
  <line x1="2" y1="26" x2="30" y2="26" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.06"/>
  <line x1="2" y1="20" x2="30" y2="20" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04"/>
  <!-- glow -->
  <polyline points="3,23 7,23 10,19 13,24 17,15 20,10 23,21 26,18 30,19"
    stroke="#ef4444" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.18" fill="none"/>
  <!-- antenna left -->
  <line x1="20" y1="10" x2="17" y2="4" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16.5" cy="3" r="1.5" fill="#ef4444"/>
  <!-- antenna right -->
  <line x1="20" y1="10" x2="23" y2="4" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="23.5" cy="3" r="1.5" fill="#ef4444"/>
  <!-- chart line -->
  <polyline points="3,23 7,23 10,19 13,24 17,15 20,10 23,21 26,18 30,19"
    stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- peak dot -->
  <circle cx="20" cy="10" r="2" fill="#ef4444"/>
</svg>
